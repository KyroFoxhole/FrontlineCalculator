<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Foxhole Logi Assistant</title>

<style>
body {
    font-family: Arial;
    background: #1e1e1e;
    color: white;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: #2b2b2b;
    padding: 20px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #4CAF50;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.output {
    margin-top: 20px;
    background: #111;
    padding: 15px;
    border-radius: 8px;
}

.big {
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Foxhole Logi Assistant V2</h1>

<label>Friendly Players</label>
<input id="friendly" type="number">

<label>Enemy Players</label>
<input id="enemy" type="number">

<label>Enemy Armor?</label>
<select id="enemyArmor">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<label>Shirts</label>
<input id="shirts" type="number">

<label>Rifles</label>
<input id="rifles" type="number">

<label>Ammo</label>
<input id="ammo" type="number">

<label>Throw AT</label>
<input id="throwAT" type="number">

<label>Ranged AT</label>
<input id="rangedAT" type="number">

<label>BMATs</label>
<input id="bmats" type="number">

<label>Bandages/Plasma</label>
<input id="meds" type="number">

<label>Transport</label>
<select id="transport">
<option value="truck">Truck (~15)</option>
<option value="flatbed">Flatbed (~60)</option>
</select>

<button onclick="calculate()">Generate</button>

<div class="output" id="output"></div>

</div>

<script>
function calculate() {

let friendly = parseInt(document.getElementById("friendly").value) || 0;
let enemy = parseInt(document.getElementById("enemy").value) || 0;
let shirts = parseInt(document.getElementById("shirts").value) || 0;
let rifles = parseInt(document.getElementById("rifles").value) || 0;
let ammo = parseInt(document.getElementById("ammo").value) || 0;
let throwAT = parseInt(document.getElementById("throwAT").value) || 0;
let rangedAT = parseInt(document.getElementById("rangedAT").value) || 0;
let bmats = parseInt(document.getElementById("bmats").value) || 0;
let meds = parseInt(document.getElementById("meds").value) || 0;
let enemyArmor = document.getElementById("enemyArmor").value;
let transport = document.getElementById("transport").value;

let capacity = (transport === "flatbed") ? 60 : 15;

// --- CORE CALCULATIONS ---

let ammoPerRifle = ammo / Math.max(rifles, 1);
let shirtsPerPlayer = shirts / Math.max(friendly, 1);
let atTotal = throwAT + rangedAT;

// --- TIME TO COLLAPSE (rough model) ---

let deathRate = Math.max(enemy / Math.max(friendly,1), 0.5); 
let shirtsPerMinute = friendly * deathRate * 0.8;

let collapseTime = shirtsPerMinute > 0 ? (shirts / shirtsPerMinute) : 999;

// --- STABILITY SCORE (0–100) ---

let stability = 100;

if (shirtsPerPlayer < 3) stability -= 30;
if (ammoPerRifle < 2) stability -= 25;
if (atTotal < 20 && enemyArmor === "yes") stability -= 20;
if (bmats < 300) stability -= 10;
if (meds < 20) stability -= 10;

stability = Math.max(0, Math.min(100, stability));

// --- PRIORITY SYSTEM ---

let priorities = [];

if (shirtsPerPlayer < 2) priorities.push("shirts");
if (ammoPerRifle < 2) priorities.push("ammoCritical");
if (enemyArmor === "yes" && atTotal < 30) priorities.push("at");
if (meds < 15) priorities.push("meds");
if (bmats < 300) priorities.push("bmats");

// --- LOADOUT ---

let loadout = {};
let remaining = capacity;

function add(item, amount) {
    if (!loadout[item]) loadout[item] = 0;
    loadout[item] += amount;
}

// PRIORITY LOOP
for (let p of priorities) {
    if (remaining <= 0) break;

    switch(p) {

        case "shirts":
            let s = Math.min(remaining, 8);
            add("Shirts", s);
            remaining -= s;
            break;

        case "ammoCritical":
            let am = Math.min(remaining, 10);
            add("Ammo", am);
            remaining -= am;

            if (remaining > 0) {
                let r = Math.min(remaining, 3);
                add("Rifles", r);
                remaining -= r;
            }
            break;

        case "at":
            let a = Math.min(remaining, 6);
            add("Stickies", a);
            remaining -= a;

            if (remaining > 0) {
                let rpg = Math.min(remaining, 4);
                add("RPG Rockets", rpg);
                remaining -= rpg;
            }
            break;

        case "meds":
            let m = Math.min(remaining, 4);
            add("Bandages/Plasma", m);
            remaining -= m;
            break;

        case "bmats":
            let b = Math.min(remaining, 6);
            add("BMATs", b);
            remaining -= b;
            break;
    }
}

// --- OUTPUT ---

let output = "";

output += `<div class="big">Stability Score: ${stability}/100</div>`;

if (collapseTime < 10) {
    output += `<div style="color:red;">⚠ COLLAPSE IMMINENT (~${collapseTime.toFixed(1)} min)</div>`;
} else if (collapseTime < 20) {
    output += `<div style="color:orange;">⚠ Unstable (~${collapseTime.toFixed(1)} min)</div>`;
} else {
    output += `<div style="color:lightgreen;">Stable (~${collapseTime.toFixed(1)} min)</div>`;
}

output += `<br><b>Primary Priority:</b> ${priorities[0] || "STABLE"}<br><br>`;
output += "<b>Recommended Loadout:</b><br>";

for (let item in loadout) {
    output += `${item}: ${loadout[item]} crates<br>`;
}

if (remaining > 0) {
    output += `<br>Unused Capacity: ${remaining}`;
}

document.getElementById("output").innerHTML = output;

}
</script>

</body>
</html>
