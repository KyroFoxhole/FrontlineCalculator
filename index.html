<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎖️ Foxhole Logi Assistant V4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Trebuchet MS', Arial, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #1a1f36 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1) 0%, rgba(33, 150, 243, 0.1) 100%);
            border-radius: 12px;
            border: 1px solid rgba(76, 175, 80, 0.2);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        /* Input Section */
        .input-section {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .input-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            padding: 12px;
            background: #2b2b2b;
            color: #fff;
            border: 2px solid #444;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
            background: #333;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(76, 175, 80, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        button.secondary {
            background: linear-gradient(135deg, #666, #555);
            flex: 0.5;
        }

        button.secondary:hover {
            background: linear-gradient(135deg, #777, #666);
        }

        /* Output Section */
        .output-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #555;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .card.critical {
            border-left: 5px solid #f44336;
        }

        .card.warning {
            border-left: 5px solid #ff9800;
        }

        .card.info {
            border-left: 5px solid #2196F3;
        }

        .card.success {
            border-left: 5px solid #4CAF50;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .icon {
            font-size: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .badge-critical {
            background: rgba(244, 67, 54, 0.2);
            color: #ff6b6b;
        }

        .badge-warning {
            background: rgba(255, 152, 0, 0.2);
            color: #ffb74d;
        }

        .badge-holding {
            background: rgba(255, 193, 7, 0.2);
            color: #ffd54f;
        }

        .badge-stable {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-size: 13px;
            color: #888;
        }

        .metric-value {
            font-size: 18px;
            font-weight: bold;
            color: #4CAF50;
        }

        .metric-value.critical {
            color: #f44336;
        }

        .metric-value.warning {
            color: #ff9800;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            transition: width 0.3s;
        }

        .progress-fill.critical {
            background: linear-gradient(90deg, #f44336, #d32f2f);
        }

        .progress-fill.warning {
            background: linear-gradient(90deg, #ff9800, #f57c00);
        }

        /* Events List */
        .events-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .event-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #2b2b2b;
            border-left: 3px solid #888;
            border-radius: 4px;
            font-size: 12px;
        }

        .event-item.critical {
            border-left-color: #f44336;
        }

        .event-item.warning {
            border-left-color: #ff9800;
        }

        .event-item.info {
            border-left-color: #2196F3;
        }

        .event-time {
            color: #4CAF50;
            font-weight: bold;
            margin-right: 8px;
        }

        /* Loadout Display */
        .loadout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #2b2b2b;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 3px solid #4CAF50;
        }

        .loadout-item-name {
            font-weight: 600;
        }

        .loadout-item-crates {
            background: #333;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #4CAF50;
        }

        /* Trip Plan */
        .trip-plan {
            background: #2b2b2b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #2196F3;
        }

        .trip-header {
            font-weight: bold;
            color: #2196F3;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .trip-efficiency {
            background: #333;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }

        .trip-contents {
            font-size: 13px;
            color: #bbb;
            padding-left: 10px;
        }

        .trip-item {
            padding: 4px 0;
            display: flex;
            gap: 10px;
        }

        /* Simulation Chart */
        .chart-container {
            background: #2b2b2b;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            overflow-x: auto;
        }

        .chart-bar {
            display: inline-block;
            margin-right: 5px;
            text-align: center;
        }

        .chart-column {
            background: linear-gradient(180deg, #4CAF50, #45a049);
            border-radius: 4px 4px 0 0;
            margin-bottom: 5px;
            min-width: 25px;
        }

        .chart-label {
            font-size: 10px;
            color: #888;
        }

        /* Recommendations */
        .recommendation {
            padding: 12px;
            margin-bottom: 10px;
            background: #2b2b2b;
            border-radius: 6px;
            border-left: 3px solid #2196F3;
            font-size: 13px;
        }

        .recommendation.critical {
            border-left-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }

        .recommendation-text {
            margin-top: 4px;
            color: #ddd;
        }

        /* Tooltip */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
            border-bottom: 1px dotted #888;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -100px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 12px;
            border: 1px solid #555;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .output-section {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 24px;
            }

            .input-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button.secondary {
                flex: 1;
            }
        }

        /* Loading state */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #444;
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎖️ Foxhole Logi Assistant V4</h1>
        <p class="subtitle">Advanced Resource Simulation & Strategic Logistics Planning</p>
    </header>

    <!-- Input Section -->
    <div class="input-section">
        <h2>📋 Frontline Assessment</h2>
        <div class="input-grid">
            <div class="input-group">
                <label>Friendly Players</label>
                <input id="friendly" type="number" value="50" min="1">
            </div>
            <div class="input-group">
                <label>Enemy Players</label>
                <input id="enemy" type="number" value="50" min="1">
            </div>
            <div class="input-group">
                <label>Enemy Armor?</label>
                <select id="enemyArmor">
                    <option value="no">No</option>
                    <option value="yes">Yes (Heavy Pressure)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Transport Type</label>
                <select id="transport">
                    <option value="truck">Truck (~15 crates)</option>
                    <option value="flatbed">Flatbed (~60 crates)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Shirts</label>
                <input id="shirts" type="number" value="100" min="0">
            </div>
            <div class="input-group">
                <label>Rifles</label>
                <input id="rifles" type="number" value="35" min="0">
            </div>
            <div class="input-group">
                <label>Ammo</label>
                <input id="ammo" type="number" value="60" min="0">
            </div>
            <div class="input-group">
                <label>Throw AT</label>
                <input id="throwAT" type="number" value="0" min="0">
            </div>
            <div class="input-group">
                <label>Ranged AT</label>
                <input id="rangedAT" type="number" value="0" min="0">
            </div>
            <div class="input-group">
                <label>BMATs</label>
                <input id="bmats" type="number" value="200" min="0">
            </div>
            <div class="input-group">
                <label>Bandages/Plasma</label>
                <input id="meds" type="number" value="30" min="0">
            </div>
        </div>

        <div class="button-group">
            <button onclick="analyzeNow()">🔄 Analyze Frontline</button>
            <button class="secondary" onclick="resetAll()">Clear</button>
        </div>
    </div>

    <!-- Output Section -->
    <div class="output-section" id="outputSection"></div>
</div>

<!-- Scripts -->
<script>
// ============================================================
// EMBEDDED SIMULATION ENGINES
// ============================================================

// [Paste simulation.js code here]
// [Paste analysis.js code here]
// [Paste loadoutBuilder.js code here]

// ============================================================
// UI RENDERER
// ============================================================

function analyzeNow() {
    const state = {
        friendly: parseInt(document.getElementById("friendly").value) || 1,
        enemy: parseInt(document.getElementById("enemy").value) || 1,
        shirts: parseInt(document.getElementById("shirts").value) || 0,
        rifles: parseInt(document.getElementById("rifles").value) || 0,
        ammo: parseInt(document.getElementById("ammo").value) || 0,
        throwAT: parseInt(document.getElementById("throwAT").value) || 0,
        rangedAT: parseInt(document.getElementById("rangedAT").value) || 0,
        bmats: parseInt(document.getElementById("bmats").value) || 0,
        meds: parseInt(document.getElementById("meds").value) || 0,
        enemyArmor: document.getElementById("enemyArmor").value,
        transport: document.getElementById("transport").value,
        weapons: WeaponConfiguration.suggestWeaponMix(
            parseInt(document.getElementById("friendly").value) || 1,
            document.getElementById("enemyArmor").value === 'yes'
        )
    };

    renderAnalysis(state);
}

function renderAnalysis(state) {
    const section = document.getElementById("outputSection");
    section.innerHTML = '<div style="padding: 20px; text-align: center;"><div class="spinner"></div> Analyzing...</div>';

    setTimeout(() => {
        // Run simulations
        const sim = new ResourceSimulation(state);
        sim.simulate(30);

        const analysis = FrontlineAnalyzer.classify(sim);
        const stability = FrontlineAnalyzer.getStabilityScore(sim);
        const saveability = FrontlineAnalyzer.assessSaveability(sim);
        const recs = FrontlineAnalyzer.getRecommendations(sim);
        const priorities = PriorityEngine.determinePriorities(sim);
        const needs = PriorityEngine.calculateNeeds(sim, priorities);
        const transport = new LogisticsTransport(state.transport);
        const { loadout, utilizationPercent } = LoadoutOptimizer.buildLoadout(transport.capacity, needs, state);
        const trips = TripPlanner.planTrips(state, 3, state.transport);

        let html = '';

        // Status Card
        html += `
        <div class="card ${analysis.state.toLowerCase()}">
            <div class="card-title">
                <span class="icon">${analysis.icon}</span>
                Frontline Status
            </div>
            <div class="status-badge badge-${analysis.state.toLowerCase()}">
                ${analysis.state} • ${analysis.urgency}
            </div>
            <div class="metric-row">
                <span class="metric-label">Stability Score</span>
                <span class="metric-value">${stability}/100</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill ${stability < 30 ? 'critical' : stability < 60 ? 'warning' : ''}" 
                     style="width: ${stability}%;"></div>
            </div>
        </div>
        `;

        // Time to Failure Card
        const ttf = sim.getTimeToFailure();
        html += `
        <div class="card info">
            <div class="card-title">
                <span class="icon">⏱️</span>
                Critical Timeline
            </div>
            <div class="metric-row">
                <span class="metric-label">Minutes to Failure</span>
                <span class="metric-value ${ttf < 15 ? 'critical' : ttf < 25 ? 'warning' : ''}">${ttf || '∞'}</span>
            </div>
            ${ttf ? `<div class="metric-row">
                <span class="metric-label">First Critical: </span>
                <span class="metric-value">${sim.getFirstFailure().type}</span>
            </div>` : ''}
            <div class="metric-row">
                <span class="metric-label">Saveability</span>
                <span class="metric-value">${Math.round(sim.estimateSaveability() * 100)}%</span>
            </div>
        </div>
        `;

        // Resources Card
        html += `
        <div class="card info">
            <div class="card-title">
                <span class="icon">📦</span>
                Resource Ratios
            </div>
            <div class="metric-row">
                <span class="metric-label">Shirts per Player</span>
                <span class="metric-value ${state.shirts / state.friendly < 2 ? 'critical' : ''}">${(state.shirts / Math.max(state.friendly, 1)).toFixed(1)}</span>
            </div>
            <div class="metric-row">
                <span class="metric-label">Ammo per Rifle</span>
                <span class="metric-value ${state.ammo / Math.max(state.rifles, 1) < 2 ? 'critical' : ''}">${(state.ammo / Math.max(state.rifles, 1)).toFixed(1)}</span>
            </div>
            <div class="metric-row">
                <span class="metric-label">Player Ratio</span>
                <span class="metric-value">${(state.friendly / Math.max(state.enemy, 1)).toFixed(2)}x</span>
            </div>
            <div class="metric-row">
                <span class="metric-label">Armor Pressure</span>
                <span class="metric-value ${sim.combat.armorPressure > 70 ? 'critical' : ''}">${sim.combat.armorPressure.toFixed(0)}%</span>
            </div>
        </div>
        `;

        // Recommendation Card
        if (recs.length > 0) {
            html += `
            <div class="card success">
                <div class="card-title">
                    <span class="icon">💡</span>
                    Key Recommendations
                </div>
                ${recs.map(rec => `
                <div class="recommendation ${rec.priority.toLowerCase()}">
                    <strong>${rec.priority}</strong>
                    <div class="recommendation-text">${rec.message}</div>
                </div>
                `).join('')}
            </div>
            `;
        }

        // Loadout Card
        html += `
        <div class="card success">
            <div class="card-title">
                <span class="icon">🚚</span>
                Recommended Loadout
            </div>
            <div class="metric-row">
                <span class="metric-label">Capacity Utilization</span>
                <span class="metric-value">${utilizationPercent.toFixed(0)}%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: ${utilizationPercent}%;"></div>
            </div>
            <div style="margin-top: 15px;">
                ${Object.keys(loadout).length > 0 ? 
                    Object.entries(loadout).map(([item, crates]) => `
                    <div class="loadout-item">
                        <span class="loadout-item-name">${item}</span>
                        <span class="loadout-item-crates">${crates} crates</span>
                    </div>
                    `).join('') 
                    : '<div style="color: #888; text-align: center;">Frontline is stable</div>'}
            </div>
        </div>
        `;

        // Strategic Assessment Card
        html += `
        <div class="card ${saveability.verdict === 'STABLE' ? 'success' : 'critical'}">
            <div class="card-title">
                <span class="icon">🎯</span>
                Strategic Assessment
            </div>
            <div class="metric-row">
                <span class="metric-label">Verdict</span>
                <span class="metric-value">${saveability.verdict}</span>
            </div>
            <div class="metric-row">
                <span class="metric-label">Action</span>
                <span class="metric-value">${saveability.action}</span>
            </div>
            <div style="margin-top: 12px; color: #bbb; font-size: 13px;">
                ${saveability.description}
            </div>
        </div>
        `;

        // Events Timeline Card
        if (sim.events.length > 0) {
            html += `
            <div class="card info">
                <div class="card-title">
                    <span class="icon">📅</span>
                    Critical Events
                </div>
                <div class="events-list">
                    ${sim.events.map(evt => `
                    <div class="event-item ${evt.type.toLowerCase()}">
                        <span class="event-time">Min ${evt.minute}:</span>
                        ${evt.message}
                    </div>
                    `).join('')}
                </div>
            </div>
            `;
        }

        // Multi-Trip Plan Card
        html += `
        <div class="card info">
            <div class="card-title">
                <span class="icon">📋</span>
                Multi-Trip Plan
            </div>
            ${trips.map((trip, idx) => `
            <div class="trip-plan">
                <div class="trip-header">
                    <span>Trip ${trip.number}</span>
                    <div class="trip-efficiency">Efficiency: ${trip.efficiency}%</div>
                </div>
                <div class="trip-contents">
                    ${Object.keys(trip.loadout).length > 0 ?
                        Object.entries(trip.loadout).map(([item, crates]) => `
                        <div class="trip-item">→ ${item}: ${crates} crates</div>
                        `).join('') 
                        : '<div style="color: #888;">No additional needs</div>'}
                </div>
            </div>
            `).join('')}
        </div>
        `;

        section.innerHTML = html;
    }, 300);
}

function resetAll() {
    document.getElementById("friendly").value = '';
    document.getElementById("enemy").value = '';
    document.getElementById("shirts").value = '';
    document.getElementById("rifles").value = '';
    document.getElementById("ammo").value = '';
    document.getElementById("throwAT").value = '';
    document.getElementById("rangedAT").value = '';
    document.getElementById("bmats").value = '';
    document.getElementById("meds").value = '';
    document.getElementById("outputSection").innerHTML = '';
}

// Auto-calculate on changes
['friendly', 'enemy', 'shirts', 'rifles', 'ammo', 'throwAT', 'rangedAT', 'bmats', 'meds', 'enemyArmor', 'transport'].forEach(id => {
    document.getElementById(id).addEventListener('change', analyzeNow);
});

</script>
</body>
</html>
