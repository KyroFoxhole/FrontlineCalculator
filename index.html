<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎖️ Foxhole Logi Assistant V4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Trebuchet MS', Arial, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #1a1f36 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1) 0%, rgba(33, 150, 243, 0.1) 100%);
            border-radius: 12px;
            border: 1px solid rgba(76, 175, 80, 0.2);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        /* Input Section */
        .input-section {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .input-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            padding: 10px;
            background: #2b2b2b;
            color: #fff;
            border: 2px solid #444;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
            background: #333;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(76, 175, 80, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        button.secondary {
            background: linear-gradient(135deg, #666, #555);
            flex: 0.5;
        }

        button.secondary:hover {
            background: linear-gradient(135deg, #777, #666);
        }

        /* Output Grid */
        .output-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            border-left: 5px solid #444;
        }

        .card:hover {
            border-color: #555;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .card.critical {
            border-left-color: #f44336;
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.05), transparent);
        }

        .card.warning {
            border-left-color: #ff9800;
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.05), transparent);
        }

        .card.holding {
            border-left-color: #ffc107;
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.05), transparent);
        }

        .card.stable {
            border-left-color: #4CAF50;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.05), transparent);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon {
            font-size: 22px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-critical {
            background: rgba(244, 67, 54, 0.25);
            color: #ff6b6b;
        }

        .badge-losing {
            background: rgba(255, 152, 0, 0.25);
            color: #ffb74d;
        }

        .badge-holding {
            background: rgba(255, 193, 7, 0.25);
            color: #ffd54f;
        }

        .badge-stable {
            background: rgba(76, 175, 80, 0.25);
            color: #81c784;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #aaa;
        }

        .stat-value {
            font-weight: bold;
            color: #4CAF50;
            font-size: 16px;
        }

        .stat-value.critical {
            color: #f44336;
        }

        .stat-value.warning {
            color: #ff9800;
        }

        .stat-value.holding {
            color: #ffc107;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #2b2b2b;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
            border: 1px solid #444;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            transition: width 0.5s ease;
        }

        .progress-fill.critical {
            background: linear-gradient(90deg, #f44336, #d32f2f);
        }

        .progress-fill.warning {
            background: linear-gradient(90deg, #ff9800, #f57c00);
        }

        .progress-fill.holding {
            background: linear-gradient(90deg, #ffc107, #ffb300);
        }

        /* Loadout */
        .loadout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #2b2b2b;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 3px solid #4CAF50;
            font-size: 14px;
        }

        .loadout-item-name {
            font-weight: 600;
            flex: 1;
        }

        .loadout-item-crates {
            background: #333;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #4CAF50;
            font-weight: bold;
        }

        /* Recommendations */
        .rec-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #2b2b2b;
            border-left: 3px solid #2196F3;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.5;
        }

        .rec-item.critical {
            border-left-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }

        .rec-item.high {
            border-left-color: #ff9800;
            background: rgba(255, 152, 0, 0.1);
        }

        .rec-priority {
            font-weight: bold;
            color: #ff9800;
            margin-bottom: 4px;
        }

        /* Events */
        .event-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #2b2b2b;
            border-left: 3px solid #888;
            border-radius: 6px;
            font-size: 12px;
        }

        .event-item.critical {
            border-left-color: #f44336;
        }

        .event-item.warning {
            border-left-color: #ff9800;
        }

        .event-minute {
            color: #4CAF50;
            font-weight: bold;
            margin-right: 8px;
        }

        /* Trip Plan */
        .trip-item {
            background: #2b2b2b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #2196F3;
        }

        .trip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #2196F3;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .trip-efficiency {
            background: #333;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: #4CAF50;
        }

        .trip-contents {
            font-size: 13px;
            color: #bbb;
        }

        .trip-content-item {
            padding: 4px 0;
            margin-left: 10px;
        }

        /* Assessment Box */
        .assessment-box {
            background: #2b2b2b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #2196F3;
        }

        .assessment-title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }

        .assessment-detail {
            font-size: 13px;
            color: #bbb;
            margin: 6px 0;
        }

        .assessment-action {
            background: #333;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: bold;
            color: #ffb74d;
        }

        /* Chart */
        .mini-chart {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 80px;
            margin-top: 15px;
            padding: 10px;
            background: #2b2b2b;
            border-radius: 6px;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #4CAF50, #45a049);
            border-radius: 3px 3px 0 0;
            min-width: 8px;
            position: relative;
        }

        .chart-bar.critical {
            background: linear-gradient(180deg, #f44336, #d32f2f);
        }

        .chart-bar.warning {
            background: linear-gradient(180deg, #ff9800, #f57c00);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .output-section {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 24px;
            }

            .input-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button.secondary {
                flex: 1;
            }
        }

        .no-data {
            text-align: center;
            color: #888;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎖️ Foxhole Logi Assistant V4</h1>
        <p class="subtitle">Advanced Combat Simulation & Dynamic Logistics Planning</p>
    </header>

    <div class="input-section">
        <h2>📋 Frontline Assessment</h2>
        <div class="input-grid">
            <div class="input-group">
                <label>Friendly Players</label>
                <input id="friendly" type="number" value="25" min="1">
            </div>
            <div class="input-group">
                <label>Enemy Players</label>
                <input id="enemy" type="number" value="25" min="1">
            </div>
            <div class="input-group">
                <label>Enemy Armor?</label>
                <select id="enemyArmor">
                    <option value="no">No</option>
                    <option value="yes">Yes (Heavy)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Transport Type</label>
                <select id="transport">
                    <option value="truck">Truck (~15)</option>
                    <option value="flatbed">Flatbed (~60)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Shirts</label>
                <input id="shirts" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>Rifles</label>
                <input id="rifles" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>Ammo</label>
                <input id="ammo" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>Throw AT</label>
                <input id="throwAT" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>Ranged AT</label>
                <input id="rangedAT" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>BMATs</label>
                <input id="bmats" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>Meds/Bandages</label>
                <input id="meds" type="number" value="20" min="0">
            </div>
        </div>

        <div class="button-group">
            <button onclick="analyzeNow()">🔄 Analyze Frontline</button>
            <button class="secondary" onclick="resetAll()">Clear</button>
        </div>
    </div>

    <div class="output-section" id="outputSection"></div>
</div>

<script>
// ============================================================
// COMBAT SIMULATOR
// ============================================================
class CombatSimulator {
    constructor(friendlyCount, enemyCount, armorPresent = false) {
        this.friendlyCount = friendlyCount;
        this.enemyCount = enemyCount;
        this.armorPresent = armorPresent;
        this.baseCombatIntensity = this.calculateCombatIntensity();
        this.currentCombatIntensity = this.baseCombatIntensity;
        this.momentumScore = 0;
        this.armorPressure = armorPresent ? 10 : 0;
    }

    calculateCombatIntensity() {
        const ratio = this.enemyCount / Math.max(this.friendlyCount, 1);
        if (ratio < 0.5) return 0.5;
        if (ratio < 1.0) return 0.7;
        if (ratio === 1.0) return 1.0;
        if (ratio < 2.0) return 1.3;
        if (ratio < 3.0) return 1.7;
        return 2.0;
    }

    updateCombatIntensity(shirts, ammo, meds) {
        let desperation = 0;
        if (shirts < 20) desperation += (20 - shirts) * 0.02;
        if (ammo < 50) desperation += (50 - ammo) * 0.01;
        if (meds < 10) desperation += (10 - meds) * 0.03;
        this.currentCombatIntensity = this.baseCombatIntensity + Math.min(desperation, 1.0);
        return this.currentCombatIntensity;
    }

    updateMomentum(isWinning) {
        if (isWinning) {
            this.momentumScore = Math.min(this.momentumScore + 5, 50);
        } else {
            this.momentumScore = Math.max(this.momentumScore - 8, -50);
        }
        return this.momentumScore;
    }

    updateArmorPressure(armorDefeated) {
        if (!this.armorPresent) return this.armorPressure;
        if (armorDefeated) {
            this.armorPressure = Math.max(this.armorPressure - 15, 0);
        } else {
            this.armorPressure = Math.min(this.armorPressure + 2, 100);
        }
        return this.armorPressure;
    }

    hasArmorBreakthrough() {
        return this.armorPressure >= 100;
    }

    getMomentumModifier() {
        return 1 + (this.momentumScore * 0.005);
    }
}

// ============================================================
// RESOURCE CONSUMPTION
// ============================================================
class ResourceConsumptionModel {
    consumeResources(state, combat, minute) {
        const intensity = combat.currentCombatIntensity;
        const momentum = combat.getMomentumModifier();

        return {
            shirts: state.friendly * 0.08 * intensity * momentum,
            ammo: Math.max(state.rifles, 1) * 0.15 * intensity * momentum,
            meds: state.friendly * 0.05 * intensity * momentum,
            bmats: state.friendly * 2 * (intensity > 1 ? 1 : 0.5)
        };
    }
}

// ============================================================
// RESOURCE SIMULATION
// ============================================================
class ResourceSimulation {
    constructor(initialState) {
        this.state = JSON.parse(JSON.stringify(initialState));
        this.combat = new CombatSimulator(
            initialState.friendly,
            initialState.enemy,
            initialState.enemyArmor === 'yes'
        );
        this.consumption = new ResourceConsumptionModel();
        this.timeline = [];
        this.failures = {};
        this.events = [];
    }

    simulate(duration = 30) {
        for (let minute = 1; minute <= duration; minute++) {
            let snapshot = {
                minute,
                resources: JSON.parse(JSON.stringify(this.state)),
                combat: {
                    intensity: this.combat.currentCombatIntensity,
                    momentum: this.combat.momentumScore,
                    armorPressure: this.combat.armorPressure
                }
            };

            // Update combat
            this.combat.updateCombatIntensity(this.state.shirts, this.state.ammo, this.state.meds);
            const isWinning = this.combat.currentCombatIntensity < 0.8;
            this.combat.updateMomentum(isWinning);

            // Consume resources
            const consumed = this.consumption.consumeResources(this.state, this.combat, minute);
            this.state.shirts = Math.max(0, this.state.shirts - consumed.shirts);
            this.state.ammo = Math.max(0, this.state.ammo - consumed.ammo);
            this.state.meds = Math.max(0, this.state.meds - consumed.meds);
            this.state.bmats = Math.max(0, this.state.bmats - consumed.bmats);

            // Update armor
            const armorDefeated = (this.state.throwAT + this.state.rangedAT > 0) && Math.random() < 0.3;
            this.combat.updateArmorPressure(armorDefeated);

            // Detect failures
            if (this.state.shirts === 0 && !this.failures.shirts) {
                this.failures.shirts = minute;
                this.events.push({ minute, type: 'CRITICAL', message: '🔴 SHIRTS DEPLETED - Squad Collapse' });
            }
            if (this.state.ammo === 0 && !this.failures.ammo) {
                this.failures.ammo = minute;
                this.events.push({ minute, type: 'CRITICAL', message: '🔴 AMMO DEPLETED - Unable to Engage' });
            }
            if (this.combat.hasArmorBreakthrough() && !this.failures.armorBreakthrough) {
                this.failures.armorBreakthrough = minute;
                this.events.push({ minute, type: 'CRITICAL', message: '🔴 ARMOR BREAKTHROUGH - Defensive Line Broken' });
            }

            const criticalCount = Object.keys(this.failures).length;
            if (criticalCount >= 2 && !this.failures.collapse) {
                this.failures.collapse = minute;
                this.events.push({ minute, type: 'CATASTROPHIC', message: '💥 FRONTLINE COLLAPSE' });
                break;
            }

            this.timeline.push(snapshot);
        }
        return this;
    }

    getFirstFailure() {
        if (Object.keys(this.failures).length === 0) return null;
        const sorted = Object.entries(this.failures).sort((a, b) => a[1] - b[1]);
        return { type: sorted[0][0], minute: sorted[0][1] };
    }

    getTimeToFailure() {
        const first = this.getFirstFailure();
        return first ? first.minute : null;
    }

    estimateSaveability() {
        const ttf = this.getTimeToFailure();
        if (!ttf || ttf > 30) return 1.0;
        if (ttf > 20) return 0.8;
        if (ttf > 15) return 0.6;
        if (ttf > 10) return 0.4;
        if (ttf > 5) return 0.2;
        return 0.0;
    }
}

// ============================================================
// FRONTLINE ANALYZER
// ============================================================
class FrontlineAnalyzer {
    static classify(simulation) {
        const ttf = simulation.getTimeToFailure();
        const state = simulation.state;
        const armor = simulation.combat.armorPressure;

        if (simulation.failures.collapse || armor >= 100) {
            return {
                state: 'COLLAPSING',
                color: '#f44336',
                urgency: 'CATASTROPHIC',
                icon: '🔥'
            };
        }
        if (ttf && ttf <= 5) {
            return {
                state: 'COLLAPSING',
                color: '#f44336',
                urgency: 'CRITICAL',
                icon: '⚠️'
            };
        }
        if (ttf && ttf <= 15) {
            return {
                state: 'LOSING',
                color: '#ff9800',
                urgency: 'HIGH',
                icon: '📉'
            };
        }
        if (ttf && ttf <= 25) {
            return {
                state: 'HOLDING',
                color: '#ffc107',
                urgency: 'MEDIUM',
                icon: '⚔️'
            };
        }
        return {
            state: 'STABLE',
            color: '#4CAF50',
            urgency: 'LOW',
            icon: '✅'
        };
    }

    static getStabilityScore(simulation) {
        let score = 100;
        const ttf = simulation.getTimeToFailure();
        const res = simulation.state;
        const friendly = simulation.state.friendly;

        if (ttf) {
            if (ttf <= 5) score -= 50;
            else if (ttf <= 10) score -= 35;
            else if (ttf <= 20) score -= 20;
            else if (ttf <= 30) score -= 10;
        }

        const shirtsPerPlayer = res.shirts / Math.max(friendly, 1);
        if (shirtsPerPlayer < 1) score -= 20;
        else if (shirtsPerPlayer < 2) score -= 10;

        const ammoPerRifle = res.ammo / Math.max(res.rifles || 1, 1);
        if (ammoPerRifle < 1) score -= 15;
        else if (ammoPerRifle < 2) score -= 8;

        if (simulation.combat.armorPressure > 75) score -= 15;
        else if (simulation.combat.armorPressure > 50) score -= 8;

        if (simulation.combat.momentumScore > 20) score += 5;
        else if (simulation.combat.momentumScore < -20) score -= 10;

        return Math.max(0, Math.min(100, score));
    }

    static assessSaveability(simulation) {
        const saveability = simulation.estimateSaveability();

        if (saveability === 1.0) {
            return {
                verdict: 'STABLE',
                action: 'REINFORCE',
                description: 'Frontline is stable. Send reinforcement supplies.'
            };
        } else if (saveability >= 0.7) {
            return {
                verdict: 'SAVEABLE',
                action: 'URGENT_RESUPPLY',
                description: 'Frontline can be held with rapid logistics.'
            };
        } else if (saveability >= 0.4) {
            return {
                verdict: 'CRITICAL',
                action: 'EMERGENCY_SUPPLIES',
                description: 'Frontline is critical. Focus only on essential supplies.'
            };
        } else if (saveability > 0) {
            return {
                verdict: 'FAILING',
                action: 'EVACUATION',
                description: 'Recommend strategic retreat and consolidation.'
            };
        } else {
            return {
                verdict: 'LOST',
                action: 'HOLD_FALLBACK',
                description: 'Frontline is already lost. Defend fallback position.'
            };
        }
    }

    static getRecommendations(simulation) {
        const recs = [];
        const res = simulation.state;
        const combat = simulation.combat;

        if (res.shirts < 20) {
            recs.push({
                priority: 'CRITICAL',
                message: 'SHIRTS CRITICAL - Squad cannot sustain casualties'
            });
        }
        if (res.ammo < 30) {
            recs.push({
                priority: 'CRITICAL',
                message: 'AMMO CRITICAL - Cannot defend position'
            });
        }
        if (combat.armorPressure > 70) {
            recs.push({
                priority: 'CRITICAL',
                message: 'ARMOR PRESSURE CRITICAL - Urgent AT support needed NOW'
            });
        }
        if (combat.momentumScore < -30) {
            recs.push({
                priority: 'HIGH',
                message: 'Morale is collapsing - rotate fresh troops if possible'
            });
        }
        if (combat.currentCombatIntensity > 1.5) {
            recs.push({
                priority: 'HIGH',
                message: 'Heavily outnumbered - consider consolidating positions'
            });
        }

        return recs;
    }
}

// ============================================================
// LOADOUT OPTIMIZER
// ============================================================
class LoadoutOptimizer {
    constructor() {
        this.transportCapacity = 100; // Example capacity
        this.supplies = [];
    }

    optimizeLoadout(criticalNeeds, secondaryResources) {
        const loadedSupplies = [];
        let usedCapacity = 0;

        // Fill with critical needs first
        for (const supply of criticalNeeds) {
            if (usedCapacity + supply.amount <= this.transportCapacity) {
                loadedSupplies.push(supply);
                usedCapacity += supply.amount;
            }
        }

        // Fill remaining capacity with secondary resources
        for (const supply of secondaryResources) {
            while (usedCapacity < this.transportCapacity && supply.amount > 0) {
                loadedSupplies.push(supply);
                usedCapacity += supply.amount;
                supply.amount--;
            }
        }

        // Fill any remaining space with surplus ammo if necessary
        while (usedCapacity < this.transportCapacity) {
            loadedSupplies.push({ type: 'Surplus Ammo', amount: 1 });
            usedCapacity++;
        }

        return loadedSupplies;
    }
}

// ============================================================
// TRIP PLANNER
// ============================================================
class TripPlanner {
    static planTrips(initialState, numTrips = 3) {
        const trips = [];
        let currentState = JSON.parse(JSON.stringify(initialState));
        const transport = initialState.transport === 'flatbed' ? 60 : 15;

        for (let tripNum = 1; tripNum <= numTrips; tripNum++) {
            const sim = new ResourceSimulation(currentState);
            sim.simulate(30);

            const { loadout, utilization } = LoadoutOptimizer.buildLoadout(transport, currentState, sim);

            let efficiency = 0;
            if (Object.keys(loadout).length > 0) {
                efficiency = Math.round(utilization * 0.6 + 40);
            }

            trips.push({
                number: tripNum,
                loadout,
                utilization: utilization.toFixed(0),
                efficiency
            });

            // Simulate delivery
            for (let item in loadout) {
                const crateSize = LoadoutOptimizer.CRATE_SIZES[item] || 10;
                const resourceName = item.toLowerCase().replace(' ', '');
                if (currentState[resourceName] !== undefined) {
                    currentState[resourceName] += loadout[item] * crateSize;
                }
            }

            // Check if stable now
            const nextSim = new ResourceSimulation(currentState);
            nextSim.simulate(30);
            if (!nextSim.getTimeToFailure() || nextSim.getTimeToFailure() > 30) break;
        }

        return trips;
    }
}

// UI RENDERER
// ============================================================
function analyzeNow() {
    const state = {
        friendly: parseInt(document.getElementById("friendly").value) || 1,
        enemy: parseInt(document.getElementById("enemy").value) || 1,
        shirts: parseInt(document.getElementById("shirts").value) || 0,
        rifles: parseInt(document.getElementById("rifles").value) || 0,
        ammo: parseInt(document.getElementById("ammo").value) || 0,
        throwAT: parseInt(document.getElementById("throwAT").value) || 0,
        rangedAT: parseInt(document.getElementById("rangedAT").value) || 0,
        bmats: parseInt(document.getElementById("bmats").value) || 0,
        meds: parseInt(document.getElementById("meds").value) || 0,
        enemyArmor: document.getElementById("enemyArmor").value,
        transport: document.getElementById("transport").value
    };

    const output = document.getElementById("outputSection");
    output.innerHTML = '<div style="text-align: center; padding: 40px; color: #888;"><div style="font-size: 20px; margin-bottom: 20px;">⏳</div>Analyzing frontline...</div>';

    setTimeout(() => renderAnalysis(state), 300);
}

function renderAnalysis(state) {
    const sim = new ResourceSimulation(state);
    sim.simulate(30);

    const analysis = FrontlineAnalyzer.classify(sim);
    const stability = FrontlineAnalyzer.getStabilityScore(sim);
    const saveability = FrontlineAnalyzer.assessSaveability(sim);
    const recs = FrontlineAnalyzer.getRecommendations(sim);
    const { loadout, utilization } = LoadoutOptimizer.buildLoadout(
        state.transport === 'flatbed' ? 60 : 15,
        state,
        sim
    );
    const trips = TripPlanner.planTrips(state, 3);

    const ttf = sim.getTimeToFailure();
    const firstFail = sim.getFirstFailure();

    let html = '';

    // Status Card
    html += `
    <div class="card ${analysis.state.toLowerCase()}">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">${analysis.icon}</span>
                Frontline Status
            </div>
            <span class="status-badge badge-${analysis.state.toLowerCase()}">${analysis.state}</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Stability Score</span>
            <span class="stat-value ${stability < 30 ? 'critical' : stability < 60 ? 'warning' : ''}">${stability}/100</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill ${stability < 30 ? 'critical' : stability < 60 ? 'warning' : ''}" style="width: ${stability}%;"></div>
        </div>
        <div class="stat-row" style="margin-top: 12px;">
            <span class="stat-label">Combat Intensity</span>
            <span class="stat-value">${sim.combat.currentCombatIntensity.toFixed(2)}x</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Morale/Momentum</span>
            <span class="stat-value ${sim.combat.momentumScore < -20 ? 'critical' : ''}">${sim.combat.momentumScore > 0 ? '+' : ''}${sim.combat.momentumScore}</span>
        </div>
    </div>
    `;

    // Critical Timeline
    html += `
    <div class="card ${ttf && ttf <= 10 ? 'critical' : 'warning'}">
        <div class="card-title">
            <span class="card-icon">⏱️</span>
            Critical Timeline
        </div>
        ${ttf ? `
            <div class="stat-row">
                <span class="stat-label">Minutes to Failure</span>
                <span class="stat-value ${ttf < 10 ? 'critical' : 'warning'}">${ttf} min</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">First Critical</span>
                <span class="stat-value">${firstFail.type.toUpperCase()}</span>
            </div>
        ` : `
            <div class="no-data">✅ No critical failures detected</div>
        `}
        <div class="stat-row" style="margin-top: 12px;">
            <span class="stat-label">Saveability</span>
            <span class="stat-value">${Math.round(sim.estimateSaveability() * 100)}%</span>
        </div>
    </div>
    `;

    // Resource Ratios
    html += `
    <div class="card stable">
        <div class="card-title">
            <span class="card-icon">📦</span>
            Resource Ratios
        </div>
        <div class="stat-row">
            <span class="stat-label">Shirts per Player</span>
            <span class="stat-value ${state.shirts / state.friendly < 2 ? 'critical' : ''}">${(state.shirts / Math.max(state.friendly, 1)).toFixed(1)}</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Ammo per Rifle</span>
            <span class="stat-value ${state.ammo / Math.max(state.rifles, 1) < 2 ? 'critical' : ''}">${(state.ammo / Math.max(state.rifles, 1)).toFixed(1)}</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Player Ratio</span>
            <span class="stat-value">${(state.friendly / Math.max(state.enemy, 1)).toFixed(2)}x</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Armor Pressure</span>
            <span class="stat-value ${sim.combat.armorPressure > 70 ? 'critical' : sim.combat.armorPressure > 40 ? 'warning' : ''}">${sim.combat.armorPressure.toFixed(0)}%</span>
        </div>
    </div>
    `;

    // Strategic Assessment
    html += `
    <div class="card ${saveability.verdict === 'STABLE' ? 'stable' : 'critical'}">
        <div class="card-title">
            <span class="card-icon">🎯</span>
            Strategic Assessment
        </div>
        <div class="assessment-box">
            <div class="assessment-title">${saveability.verdict}</div>
            <div class="assessment-detail">${saveability.description}</div>
            <div class="assessment-action">→ ${saveability.action}</div>
        </div>
    </div>
    `;

    // Loadout
    html += `
    <div class="card stable">
        <div class="card-title">
            <span class="card-icon">🚚</span>
            Recommended Loadout
        </div>
        <div class="stat-row">
            <span class="stat-label">Capacity Utilization</span>
            <span class="stat-value">${utilization.toFixed(0)}%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" style="width: ${utilization}%;"></div>
        </div>
        ${Object.keys(loadout).length > 0 ? `
            <div style="margin-top: 15px;">
                ${Object.entries(loadout).map(([item, crates]) => `
                    <div class="loadout-item">
                        <span class="loadout-item-name">${item}</span>
                        <span class="loadout-item-crates">${crates} crates</span>
                    </div>
                `).join('')}
            </div>
        ` : `<div class="no-data">✅ Frontline is stable - no urgent needs</div>`}
    </div>
    `;

    // Recommendations
    if (recs.length > 0) {
        html += `
        <div class="card warning">
            <div class="card-title">
                <span class="card-icon">💡</span>
                Key Recommendations
            </div>
            ${recs.map(rec => `
                <div class="rec-item ${rec.priority.toLowerCase()}">
                    <div class="rec-priority">⚠️ ${rec.priority}</div>
                    ${rec.message}
                </div>
            `).join('')}
        </div>
        `;
    }

    // Events
    if (sim.events.length > 0) {
        html += `
        <div class="card warning">
            <div class="card-title">
                <span class="card-icon">📅</span>
                Critical Events
            </div>
            ${sim.events.map(evt => `
                <div class="event-item ${evt.type.toLowerCase()}">
                    <span class="event-minute">Min ${evt.minute}:</span> ${evt.message}
                </div>
            `).join('')}
        </div>
        `;
    }

    // Multi-Trip Plan
    html += `
    <div class="card stable">
        <div class="card-title">
            <span class="card-icon">📋</span>
            Multi-Trip Logistics
        </div>
        ${trips.map(trip => `
            <div class="trip-item">
                <div class="trip-header">
                    <span>Trip ${trip.number}</span>
                    <div class="trip-efficiency">Efficiency: ${trip.efficiency}%</div>
                </div>
                <div class="trip-contents">
                    ${Object.keys(trip.loadout).length > 0 ?
                        Object.entries(trip.loadout).map(([item, crates]) => `
                            <div class="trip-content-item">→ ${item}: ${crates} crates</div>
                        `).join('')
                        : '<div style="color: #888;">✅ No additional needs</div>'}
                </div>
            </div>
        `).join('')}
    </div>
    `;

    document.getElementById("outputSection").innerHTML = html;
}

function resetAll() {
    document.getElementById("friendly").value = '';
    document.getElementById("enemy").value = '';
    document.getElementById("shirts").value = '';
    document.getElementById("rifles").value = '';
    document.getElementById("ammo").value = '';
    document.getElementById("throwAT").value = '';
    document.getElementById("rangedAT").value = '';
    document.getElementById("bmats").value = '';
    document.getElementById("meds").value = '';
    document.getElementById("outputSection").innerHTML = '';
}

// Auto-calculate on change
['friendly', 'enemy', 'enemyArmor', 'transport'].forEach(id => {
    document.getElementById(id).addEventListener('change', analyzeNow);
});
</script>
