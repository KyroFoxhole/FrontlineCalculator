<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎖️ Foxhole Logi Assistant V4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Trebuchet MS', Arial, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #1a1f36 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1) 0%, rgba(33, 150, 243, 0.1) 100%);
            border-radius: 12px;
            border: 1px solid rgba(76, 175, 80, 0.2);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        /* Input Section */
        .input-section {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .input-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            padding: 10px;
            background: #2b2b2b;
            color: #fff;
            border: 2px solid #444;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
            background: #333;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(76, 175, 80, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        button.secondary {
            background: linear-gradient(135deg, #666, #555);
            flex: 0.5;
        }

        button.secondary:hover {
            background: linear-gradient(135deg, #777, #666);
        }

        /* Output Grid */
        .output-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            border-left: 5px solid #444;
        }

        .card:hover {
            border-color: #555;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .card.critical {
            border-left-color: #f44336;
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.05), transparent);
        }

        .card.warning {
            border-left-color: #ff9800;
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.05), transparent);
        }

        .card.holding {
            border-left-color: #ffc107;
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.05), transparent);
        }

        .card.stable {
            border-left-color: #4CAF50;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.05), transparent);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon {
            font-size: 22px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-critical {
            background: rgba(244, 67, 54, 0.25);
            color: #ff6b6b;
        }

        .badge-losing {
            background: rgba(255, 152, 0, 0.25);
            color: #ffb74d;
        }

        .badge-holding {
            background: rgba(255, 193, 7, 0.25);
            color: #ffd54f;
        }

        .badge-stable {
            background: rgba(76, 175, 80, 0.25);
            color: #81c784;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #aaa;
        }

        .stat-value {
            font-weight: bold;
            color: #4CAF50;
            font-size: 16px;
        }

        .stat-value.critical {
            color: #f44336;
        }

        .stat-value.warning {
            color: #ff9800;
        }

        .stat-value.holding {
            color: #ffc107;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #2b2b2b;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
            border: 1px solid #444;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            transition: width 0.5s ease;
        }

        .progress-fill.critical {
            background: linear-gradient(90deg, #f44336, #d32f2f);
        }

        .progress-fill.warning {
            background: linear-gradient(90deg, #ff9800, #f57c00);
        }

        .progress-fill.holding {
            background: linear-gradient(90deg, #ffc107, #ffb300);
        }

        /* Loadout */
        .loadout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #2b2b2b;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 3px solid #4CAF50;
            font-size: 14px;
        }

        .loadout-item-name {
            font-weight: 600;
            flex: 1;
        }

        .loadout-item-crates {
            background: #333;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #4CAF50;
            font-weight: bold;
        }

        /* Recommendations */
        .rec-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #2b2b2b;
            border-left: 3px solid #2196F3;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.5;
        }

        .rec-item.critical {
            border-left-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }

        .rec-item.high {
            border-left-color: #ff9800;
            background: rgba(255, 152, 0, 0.1);
        }

        .rec-priority {
            font-weight: bold;
            color: #ff9800;
            margin-bottom: 4px;
        }

        /* Events */
        .event-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #2b2b2b;
            border-left: 3px solid #888;
            border-radius: 6px;
            font-size: 12px;
        }

        .event-item.critical {
            border-left-color: #f44336;
        }

        .event-item.warning {
            border-left-color: #ff9800;
        }

        .event-minute {
            color: #4CAF50;
            font-weight: bold;
            margin-right: 8px;
        }

        /* Trip Plan */
        .trip-item {
            background: #2b2b2b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #2196F3;
        }

        .trip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #2196F3;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .trip-efficiency {
            background: #333;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: #4CAF50;
        }

        .trip-contents {
            font-size: 13px;
            color: #bbb;
        }

        .trip-content-item {
            padding: 4px 0;
            margin-left: 10px;
        }

        /* Assessment Box */
        .assessment-box {
            background: #2b2b2b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #2196F3;
        }

        .assessment-title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }

        .assessment-detail {
            font-size: 13px;
            color: #bbb;
            margin: 6px 0;
        }

        .assessment-action {
            background: #333;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: bold;
            color: #ffb74d;
        }

        /* Chart */
        .mini-chart {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 80px;
            margin-top: 15px;
            padding: 10px;
            background: #2b2b2b;
            border-radius: 6px;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #4CAF50, #45a049);
            border-radius: 3px 3px 0 0;
            min-width: 8px;
            position: relative;
        }

        .chart-bar.critical {
            background: linear-gradient(180deg, #f44336, #d32f2f);
        }

        .chart-bar.warning {
            background: linear-gradient(180deg, #ff9800, #f57c00);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .output-section {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 24px;
            }

            .input-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button.secondary {
                flex: 1;
            }
        }

        .no-data {
            text-align: center;
            color: #888;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎖️ Foxhole Logi Assistant V4</h1>
        <p class="subtitle">Advanced Combat Simulation & Dynamic Logistics Planning</p>
    </header>

    <div class="input-section">
        <h2>📋 Frontline Assessment</h2>
        <div class="input-grid">
            <div class="input-group">
                <label>Friendly Players</label>
                <input id="friendly" type="number" value="25" min="1">
            </div>
            <div class="input-group">
                <label>Enemy Players</label>
                <input id="enemy" type="number" value="25" min="1">
            </div>
            <div class="input-group">
                <label>Enemy Armor?</label>
                <select id="enemyArmor">
                    <option value="no">No</option>
                    <option value="yes">Yes (Heavy)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Transport Type</label>
                <select id="transport">
                    <option value="truck">Truck (~15)</option>
                    <option value="flatbed">Flatbed (~60)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Shirts</label>
                <input id="shirts" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>Rifles</label>
                <input id="rifles" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>Ammo</label>
                <input id="ammo" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>Throw AT</label>
                <input id="throwAT" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>Ranged AT</label>
                <input id="rangedAT" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>BMATs</label>
                <input id="bmats" type="number" value="20" min="0">
            </div>
            <div class="input-group">
                <label>Meds/Bandages</label>
                <input id="meds" type="number" value="20" min="0">
            </div>
        </div>

        <div class="button-group">
            <button id="analyzeBtn">🔄 Analyze Frontline</button>
            <button class="secondary" onclick="resetAll()">Clear</button>
        </div>
    </div>

    <div class="output-section" id="outputSection"></div>
</div>

<script>
// ============================================================
// IMPORT EXTERNAL MODULES
// ============================================================
</script>
<!-- Move scripts to end of body for correct load order -->
</div>

<script src="simulation.js"></script>
<script src="analysis.js"></script>
<script src="loadoutBuilder.js"></script>
<script>
window.onload = function() {
    // Attach event handler for Analyze Frontline button

    // Show test message on page load
    var output = document.getElementById("outputSection");
    if (output) {
        output.innerHTML = '<div style="color:#4CAF50;">[Test] Page loaded, outputSection is accessible.</div>';
    }

    // Attach event handler for Analyze Frontline button
    var analyzeBtn = document.getElementById('analyzeBtn');
    if (analyzeBtn) {
        analyzeBtn.onclick = function() {
            if (output) {
                output.innerHTML = '<div style="color:#2196F3;">[Test] Analyze button clicked.</div>';
            }
            window.analyzeNow();
        };
    }

    window.analyzeNow = function() {
        const output = document.getElementById("outputSection");
        try {
            console.log("analyzeNow called");
            // Debug: Check if classes are defined
            console.log("ResourceSimulation:", typeof ResourceSimulation);
            console.log("FrontlineAnalyzer:", typeof FrontlineAnalyzer);
            console.log("LoadoutOptimizer:", typeof LoadoutOptimizer);
            console.log("TripPlanner:", typeof TripPlanner);

            const state = {
                friendly: parseInt(document.getElementById("friendly").value) || 1,
                enemy: parseInt(document.getElementById("enemy").value) || 1,
                shirts: parseInt(document.getElementById("shirts").value) || 0,
                rifles: parseInt(document.getElementById("rifles").value) || 0,
                ammo: parseInt(document.getElementById("ammo").value) || 0,
                throwAT: parseInt(document.getElementById("throwAT").value) || 0,
                rangedAT: parseInt(document.getElementById("rangedAT").value) || 0,
                bmats: parseInt(document.getElementById("bmats").value) || 0,
                meds: parseInt(document.getElementById("meds").value) || 0,
                enemyArmor: document.getElementById("enemyArmor").value,
                transport: document.getElementById("transport").value
            };

            output.innerHTML = '<div style="text-align: center; padding: 40px; color: #888;"><div style="font-size: 20px; margin-bottom: 20px;">⏳</div>Analyzing frontline...</div>';

            setTimeout(() => renderAnalysis(state), 300);
        } catch (err) {
            console.error("Error in analyzeNow:", err);
            output.innerHTML = '<div style="color: #f44336; padding: 30px; background: #2b2b2b; border-radius: 8px;">❌ <b>Error:</b> ' + (err && err.message ? err.message : err) + '<br><pre style="color:#ff9800; margin-top:10px;">' + (err && err.stack ? err.stack : '') + '</pre></div>';
        }
    }

    window.renderAnalysis = function(state) {
    const sim = new ResourceSimulation(state);
    sim.simulate(30);

    const analysis = FrontlineAnalyzer.classify(sim);
    const stability = FrontlineAnalyzer.getStabilityScore(sim);
    const saveability = FrontlineAnalyzer.assessSaveability(sim);
    const recs = FrontlineAnalyzer.getRecommendations(sim);
    const { loadout, utilizationPercent } = LoadoutOptimizer.buildLoadout(
        state.transport === 'flatbed' ? 60 : 15,
        state,
        sim
    );
    const trips = TripPlanner.planTrips(state, 3);

    const ttf = sim.getTimeToFailure();
    const firstFail = sim.getFirstFailure();

    // FIX: Ensure html is always a local variable
    var html = '';

    // (Removed duplicate and misplaced template code)

    // Critical Timeline
    html += `
    <div class="card ${ttf && ttf <= 10 ? 'critical' : 'warning'}">
        <div class="card-title">
            <span class="card-icon">⏱️</span>
            Critical Timeline
        </div>
        ${ttf ? `
            <div class="stat-row">
                <span class="stat-label">Minutes to Failure</span>
                <span class="stat-value ${ttf < 10 ? 'critical' : 'warning'}">${ttf} min</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">First Critical</span>
                <span class="stat-value">${firstFail.type.toUpperCase()}</span>
            </div>
        ` : `
            <div class="no-data">✅ No critical failures detected</div>
        `}
        <div class="stat-row" style="margin-top: 12px;">
            <span class="stat-label">Saveability</span>
            <span class="stat-value">${Math.round(sim.estimateSaveability() * 100)}%</span>
        </div>
    </div>
    `;

    // Resource Ratios
    html += `
    <div class="card stable">
        <div class="card-title">
            <span class="card-icon">📦</span>
            Resource Ratios
        </div>
        <div class="stat-row">
            <span class="stat-label">Shirts per Player</span>
            <span class="stat-value ${state.shirts / state.friendly < 2 ? 'critical' : ''}">${(state.shirts / Math.max(state.friendly, 1)).toFixed(1)}</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Ammo per Rifle</span>
            <span class="stat-value ${state.ammo / Math.max(state.rifles, 1) < 2 ? 'critical' : ''}">${(state.ammo / Math.max(state.rifles, 1)).toFixed(1)}</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Player Ratio</span>
            <span class="stat-value">${(state.friendly / Math.max(state.enemy, 1)).toFixed(2)}x</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Armor Pressure</span>
            <span class="stat-value ${sim.combat.armorPressure > 70 ? 'critical' : sim.combat.armorPressure > 40 ? 'warning' : ''}">${sim.combat.armorPressure.toFixed(0)}%</span>
        </div>
    </div>
    `;

    // Strategic Assessment
    html += `
    <div class="card ${saveability.verdict === 'STABLE' ? 'stable' : 'critical'}">
        <div class="card-title">
            <span class="card-icon">🎯</span>
            Strategic Assessment
        </div>
        <div class="assessment-box">
            <div class="assessment-title">${saveability.verdict}</div>
            <div class="assessment-detail">${saveability.description}</div>
            <div class="assessment-action">→ ${saveability.action}</div>
        </div>
    </div>
    `;

    // Loadout
    html += `
    <div class="card stable">
        <div class="card-title">
            <span class="card-icon">🚚</span>
            Recommended Loadout
        </div>
        <div class="stat-row">
            <span class="stat-label">Capacity Utilization</span>
            <span class="stat-value">${sanitizeResource(utilizationPercent).toFixed(0)}%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" style="width: ${sanitizeResource(utilizationPercent)}%;"></div>
        </div>
        ${Object.keys(loadout).length > 0 ? `
            <div style="margin-top: 15px;">
                ${Object.entries(loadout).map(([item, crates]) => `
                    <div class="loadout-item">
                        <span class="loadout-item-name">${item}</span>
                        <span class="loadout-item-crates">${crates} crates</span>
                    </div>
                `).join('')}
            </div>
        ` : `<div class="no-data">✅ Frontline is stable - no urgent needs</div>`}
    </div>
    `;

    // Recommendations
    if (recs.length > 0) {
        html += `
        <div class="card warning">
            <div class="card-title">
                <span class="card-icon">💡</span>
                Key Recommendations
            </div>
            ${recs.map(rec => `
                <div class="rec-item ${rec.priority.toLowerCase()}">
                    <div class="rec-priority">⚠️ ${rec.priority}</div>
                    ${rec.message}
                </div>
            `).join('')}
        </div>
        `;
    }

    // Events
    if (sim.events.length > 0) {
        html += `
        <div class="card warning">
            <div class="card-title">
                <span class="card-icon">📅</span>
                Critical Events
            </div>
            ${sim.events.map(evt => `
                <div class="event-item ${evt.type.toLowerCase()}">
                    <span class="event-minute">Min ${evt.minute}:</span> ${evt.message}
                </div>
            `).join('')}
        </div>
        `;
    }

    // Multi-Trip Plan
    html += `
    <div class="card stable">
        <div class="card-title">
            <span class="card-icon">📋</span>
            Multi-Trip Logistics
        </div>
        ${trips.map(trip => `
            <div class="trip-item">
                <div class="trip-header">
                    <span>Trip ${trip.number}</span>
                    <div class="trip-efficiency">Efficiency: ${trip.efficiency}%</div>
                </div>
                <div class="trip-contents">
                    ${Object.keys(trip.loadout).length > 0 ?
                        Object.entries(trip.loadout).map(([item, crates]) => `
                            <div class="trip-content-item">→ ${item}: ${crates} crates</div>
                        `).join('')
                        : '<div style="color: #888;">✅ No additional needs</div>'}
                </div>
            </div>
        `).join('')}
    </div>
    `;

    document.getElementById("outputSection").innerHTML = html;
}

function resetAll() {
    document.getElementById("friendly").value = '';
    document.getElementById("enemy").value = '';
    document.getElementById("shirts").value = '';
    document.getElementById("rifles").value = '';
    document.getElementById("ammo").value = '';
    document.getElementById("throwAT").value = '';
    document.getElementById("rangedAT").value = '';
    document.getElementById("bmats").value = '';
    document.getElementById("meds").value = '';
    document.getElementById("outputSection").innerHTML = '';
}

// Auto-calculate on change
['friendly', 'enemy', 'enemyArmor', 'transport'].forEach(id => {
    document.getElementById(id).addEventListener('change', analyzeNow);
});
</script>

</body>
</html>
